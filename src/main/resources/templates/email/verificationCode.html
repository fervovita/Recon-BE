<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, sans-serif;">
<table style="padding:40px 0;" width="100%">
    <tr>
        <td align="center">
            <table style="background-color:#ffffff; border-radius:8px; padding:40px;"
                   width="600">
                <tr>
                    <td align="center" style="padding-bottom:30px;">
                        <h1 style="color:#333333; margin:0;">Recon</h1>
                    </td>
                </tr>
                <tr>
                    <td align="center" style="padding-bottom:20px;">
                        <p style="color:#666666; font-size:16px; margin:0;">이메일 인증을 위해 아래 코드를 입력해주세요.</p>
                    </td>
                </tr>
                <tr>
                    <td align="center" style="padding:20px 0;">
                        <div style="background-color:#f8f8f8; border-radius:8px; padding:20px 40px; display:inline-block;">
                            <span style="font-size:32px; font-weight:bold; letter-spacing:8px; color:#333333;"
                                  th:text="${code}"></span>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td align="center" style="padding-top:20px;">
                        <p style="color:#999999; font-size:14px; margin:0;">이 코드는 5분간 유효합니다.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
